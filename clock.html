<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .clock-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
        }

        .clock-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .clock-region {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
            font-style: italic;
        }

        .digital-clock {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 15px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .date-display {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 15px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .timezone-offset {
            font-size: 0.85rem;
            color: #aaa;
            background: #f5f5f5;
            padding: 8px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        .controls button {
            background: white;
            color: #667eea;
            border: 2px solid white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 10px;
        }

        .controls button:hover {
            background: transparent;
            color: white;
            transform: scale(1.05);
        }

        .timezone-selector {
            text-align: center;
            margin-bottom: 30px;
        }

        .timezone-selector label {
            color: white;
            font-weight: bold;
            margin-right: 10px;
        }

        .timezone-selector select {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            background: white;
            color: #667eea;
            cursor: pointer;
            min-width: 200px;
        }

        .add-timezone-btn {
            background: white;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin-left: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-timezone-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .remove-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .remove-btn:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .format-toggle {
            text-align: center;
            margin-bottom: 30px;
        }

        .format-toggle label {
            color: white;
            font-weight: bold;
            margin-right: 15px;
        }

        .format-toggle input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: white;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .digital-clock {
                font-size: 2rem;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }

            .timezone-selector select {
                min-width: 150px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>⏰ Digital Clock</h1>
            <p>View current time across multiple time zones</p>
        </div>

        <div class="format-toggle">
            <label for="format-24">24-Hour Format:</label>
            <input type="checkbox" id="format-24" checked>
        </div>

        <div class="timezone-selector">
            <label for="timezone-select">Add Timezone:</label>
            <select id="timezone-select">
                <option value="">-- Select a timezone --</option>
                <option value="America/New_York">New York (EST/EDT)</option>
                <option value="America/Chicago">Chicago (CST/CDT)</option>
                <option value="America/Denver">Denver (MST/MDT)</option>
                <option value="America/Los_Angeles">Los Angeles (PST/PDT)</option>
                <option value="Europe/London">London (GMT/BST)</option>
                <option value="Europe/Paris">Paris (CET/CEST)</option>
                <option value="Europe/Berlin">Berlin (CET/CEST)</option>
                <option value="Asia/Tokyo">Tokyo (JST)</option>
                <option value="Asia/Shanghai">Shanghai (CST)</option>
                <option value="Asia/Hong_Kong">Hong Kong (HKT)</option>
                <option value="Asia/Dubai">Dubai (GST)</option>
                <option value="Asia/Kolkata">India (IST)</option>
                <option value="Asia/Singapore">Singapore (SGT)</option>
                <option value="Australia/Sydney">Sydney (AEDT/AEST)</option>
                <option value="Pacific/Auckland">Auckland (NZDT/NZST)</option>
                <option value="America/Toronto">Toronto (EST/EDT)</option>
                <option value="America/Mexico_City">Mexico City (CST/CDT)</option>
                <option value="America/Sao_Paulo">São Paulo (BRT/BRST)</option>
                <option value="Africa/Cairo">Cairo (EET)</option>
                <option value="Africa/Johannesburg">Johannesburg (SAST)</option>
            </select>
            <button class="add-timezone-btn" onclick="addTimezone()">Add</button>
        </div>

        <div class="controls">
            <button onclick="resetClocks()">Reset to Default</button>
        </div>

        <div class="clocks-grid" id="clocks-container">
            <!-- Clocks will be generated here -->
        </div>
    </div>

    <script>
        // Default timezones
        const defaultTimezones = [
            'America/New_York',
            'Europe/London',
            'Asia/Tokyo'
        ];

        // Get timezones from localStorage or use defaults
        let selectedTimezones = JSON.parse(localStorage.getItem('selectedTimezones')) || defaultTimezones;
        let is24HourFormat = JSON.parse(localStorage.getItem('is24HourFormat')) !== false;

        // Initialize
        function init() {
            document.getElementById('format-24').checked = is24HourFormat;
            renderClocks();
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        // Render clock cards
        function renderClocks() {
            const container = document.getElementById('clocks-container');
            container.innerHTML = '';

            selectedTimezones.forEach(timezone => {
                const card = document.createElement('div');
                card.className = 'clock-card';
                card.innerHTML = `
                    <div class="clock-title">${getTimezoneCity(timezone)}</div>
                    <div class="clock-region">${timezone}</div>
                    <div class="digital-clock" data-timezone="${timezone}">--:--:--</div>
                    <div class="date-display" data-date="${timezone}">--/--/----</div>
                    <div class="timezone-offset" data-offset="${timezone}">UTC offset</div>
                    ${selectedTimezones.length > 1 ? `<button class="remove-btn" onclick="removeTimezone('${timezone}')">Remove</button>` : ''}
                `;
                container.appendChild(card);
            });

            localStorage.setItem('selectedTimezones', JSON.stringify(selectedTimezones));
        }

        // Update all clocks
        function updateClocks() {
            selectedTimezones.forEach(timezone => {
                const time = new Date().toLocaleString('en-US', { 
                    timeZone: timezone,
                    hour12: !is24HourFormat,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                const date = new Date().toLocaleString('en-US', { 
                    timeZone: timezone,
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit'
                });

                const clockElement = document.querySelector(`[data-timezone="${timezone}"]`);
                const dateElement = document.querySelector(`[data-date="${timezone}"]`);
                const offsetElement = document.querySelector(`[data-offset="${timezone}"]`);

                if (clockElement) clockElement.textContent = time;
                if (dateElement) dateElement.textContent = date;
                if (offsetElement) offsetElement.textContent = getUTCOffset(timezone);
            });
        }

        // Get UTC offset for timezone
        function getUTCOffset(timezone) {
            const formatter = new Intl.DateTimeFormat('en-US', {
                timeZone: timezone,
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });

            const parts = formatter.formatToParts(new Date());
            const tzDate = new Date(`${parts[4].value}-${parts[0].value}-${parts[2].value}T${parts[6].value}:${parts[8].value}:${parts[10].value}Z`);
            const offset = (new Date() - tzDate) / 3600000;
            const sign = offset >= 0 ? '+' : '-';
            const hours = String(Math.floor(Math.abs(offset))).padStart(2, '0');
            const minutes = String((Math.abs(offset) % 1) * 60).padStart(2, '0');
            return `UTC ${sign}${hours}:${minutes}`;
        }

        // Get city name from timezone
        function getTimezoneCity(timezone) {
            return timezone.split('/').pop().replace(/_/g, ' ');
        }

        // Add timezone
        function addTimezone() {
            const select = document.getElementById('timezone-select');
            const timezone = select.value;

            if (!timezone) {
                alert('Please select a timezone');
                return;
            }

            if (selectedTimezones.includes(timezone)) {
                alert('This timezone is already added');
                return;
            }

            selectedTimezones.push(timezone);
            select.value = '';
            renderClocks();
            updateClocks();
        }

        // Remove timezone
        function removeTimezone(timezone) {
            selectedTimezones = selectedTimezones.filter(tz => tz !== timezone);
            renderClocks();
            updateClocks();
        }

        // Reset to default
        function resetClocks() {
            selectedTimezones = defaultTimezones;
            is24HourFormat = true;
            document.getElementById('format-24').checked = true;
            renderClocks();
            updateClocks();
            localStorage.setItem('selectedTimezones', JSON.stringify(selectedTimezones));
            localStorage.setItem('is24HourFormat', true);
        }

        // Toggle 24-hour format
        document.getElementById('format-24').addEventListener('change', function() {
            is24HourFormat = this.checked;
            localStorage.setItem('is24HourFormat', is24HourFormat);
            updateClocks();
        });

        // Initialize on load
        window.addEventListener('load', init);
    </script>

</body>
</html>
